name: Daily FII DII Scrape

on:
  schedule:
    - cron: '30 14 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated from v3

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated from v4
        with:
          python-version: '3.11' # Using a more modern Python for 2026

      - name: Install dependencies
        run: |
          pip install playwright pandas
          playwright install chromium

      - name: Run Scraper
        run: python scraper.py 

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add FII_DII_Daily_Data_2014_to_Today.csv
          git commit -m "Auto-update FII/DII data" || exit 0
          git push
